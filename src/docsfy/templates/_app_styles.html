<style>
/* ==========================================================================
   docsfy Shared App Styles (included by all app templates)
   ========================================================================== */

/* --------------------------------------------------------------------------
   CSS Custom Properties (Light Theme - Default)
   -------------------------------------------------------------------------- */
:root {
    /* Backgrounds */
    --bg-primary: #ffffff;
    --bg-secondary: #f9fafb;
    --bg-tertiary: #f3f4f6;
    --bg-card: #ffffff;

    /* Text */
    --text-primary: #111827;
    --text-secondary: #4b5563;
    --text-tertiary: #6b7280;
    --text-inverse: #ffffff;

    /* Borders */
    --border-primary: #e5e7eb;
    --border-focus: #4f46e5;

    /* Accent */
    --accent: #4f46e5;
    --accent-light: #eef2ff;
    --accent-hover: #4338ca;

    /* Status colors */
    --status-ready: #10b981;
    --status-generating: #3b82f6;
    --status-error: #ef4444;
    --status-aborted: #f59e0b;
    --status-ready-bg: #ecfdf5;
    --status-generating-bg: #eff6ff;
    --status-error-bg: #fef2f2;
    --status-aborted-bg: #fffbeb;

    /* Shadows */
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
    --shadow-focus: 0 0 0 3px var(--accent-light, rgba(99, 102, 241, 0.3));

    /* Layout */
    --header-height: 56px;

    /* Typography */
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
    --font-mono: "SF Mono", SFMono-Regular, ui-monospace, "DejaVu Sans Mono", Menlo, Consolas, monospace;

    /* Transitions */
    --transition-fast: 150ms ease;
}

/* --------------------------------------------------------------------------
   Dark Theme
   -------------------------------------------------------------------------- */
[data-theme="dark"] {
    --bg-primary: #0f1117;
    --bg-secondary: #161822;
    --bg-tertiary: #1e2030;
    --bg-card: #161822;

    --text-primary: #e5e7eb;
    --text-secondary: #9ca3af;
    --text-tertiary: #6b7280;
    --text-inverse: #ffffff;

    --border-primary: #2e3248;
    --border-focus: #818cf8;

    --accent: #818cf8;
    --accent-light: #1e1b4b;
    --accent-hover: #a5b4fc;

    --status-ready-bg: #052e16;
    --status-generating-bg: #172554;
    --status-error-bg: #450a0a;
    --status-aborted-bg: #451a03;

    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -2px rgba(0, 0, 0, 0.3);
    --shadow-focus: 0 0 0 3px var(--accent-light, rgba(99, 102, 241, 0.3));
}

/* --------------------------------------------------------------------------
   Reset & Base
   -------------------------------------------------------------------------- */
*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html {
    font-size: 16px;
}

body {
    font-family: var(--font-sans);
    background: var(--bg-primary);
    color: var(--text-primary);
}

/* --------------------------------------------------------------------------
   Theme Toggle & Icon Display
   -------------------------------------------------------------------------- */
/* Default: hide both icons until theme is set */
.icon-sun { display: none; }
.icon-moon { display: none; }
[data-theme="dark"] .icon-sun { display: inline; }
[data-theme="light"] .icon-moon { display: inline; }

/* --------------------------------------------------------------------------
   Common Button Styles
   --------------------------------------------------------------------------
   Unified button system: clean text buttons, no borders/backgrounds by default.
   Borders appear on hover. Color modifiers distinguish button types.
   -------------------------------------------------------------------------- */
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.35rem;
    padding: 0.5rem 1rem;
    font-size: 0.875rem;
    font-weight: 500;
    font-family: var(--font-sans);
    height: 38px;
    border-radius: 0.5rem;
    cursor: pointer;
    transition: all 0.15s ease;
    background: transparent;
    border: 1px solid transparent;
    text-decoration: none;
    white-space: nowrap;
}

.btn:active {
    transform: scale(0.98);
}

.btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* Size: small */
.btn-sm {
    padding: 0.3rem 0.6rem;
    font-size: 0.8rem;
}

/* Color: Primary (accent) */
.btn-primary {
    color: var(--accent);
}
.btn-primary:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--accent-light);
}

/* Color: Secondary (neutral) */
.btn-secondary {
    color: var(--text-secondary);
}
.btn-secondary:hover:not(:disabled) {
    border-color: var(--border-primary);
    background: var(--bg-tertiary);
}

/* Color: Danger (red) */
.btn-danger {
    color: var(--status-error);
}
.btn-danger:hover:not(:disabled) {
    border-color: var(--status-error);
    background: var(--status-error-bg, rgba(239, 68, 68, 0.1));
}

/* Color: Warning (amber) */
.btn-warning {
    color: var(--status-aborted, #d97706);
}
.btn-warning:hover:not(:disabled) {
    border-color: var(--status-aborted, #d97706);
    background: var(--status-aborted-bg, rgba(245, 158, 11, 0.1));
}

/* --------------------------------------------------------------------------
   Common Form Styles
   -------------------------------------------------------------------------- */
.form-group {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
}

.form-input, .form-select {
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--border-primary);
    border-radius: 0.375rem;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 0.8125rem;
    transition: border-color var(--transition-fast);
}

.form-input:focus, .form-select:focus {
    outline: none;
    border-color: var(--border-focus);
    box-shadow: var(--shadow-focus);
}

/* --------------------------------------------------------------------------
   Shared Header Components (dashboard, status)
   -------------------------------------------------------------------------- */
.dashboard-header {
    height: var(--header-height);
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-primary);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
}

.dashboard-logo {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text-primary);
    text-decoration: none;
    letter-spacing: -0.02em;
}

.dashboard-logo span {
    color: var(--accent);
}

.docs-badge {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 2px 8px;
    background: var(--accent);
    color: white;
    border-radius: 4px;
    text-decoration: none;
    margin-left: 8px;
    transition: opacity 0.15s ease;
}

.docs-badge:hover {
    opacity: 0.8;
}

.brand-accent {
    color: var(--accent);
}

.header-actions {
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.theme-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border: 1px solid var(--border-primary);
    border-radius: 8px;
    background: var(--bg-primary);
    color: var(--text-secondary);
    cursor: pointer;
    transition: color var(--transition-fast), border-color var(--transition-fast);
}

.theme-toggle:hover {
    color: var(--text-primary);
    border-color: var(--border-focus);
}

/* --------------------------------------------------------------------------
   Status Dot Indicators (dashboard, status)
   -------------------------------------------------------------------------- */
.status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
}

.status-dot-ready {
    background: var(--status-ready);
}

.status-dot-generating {
    background: var(--status-generating);
    animation: pulse 2s ease-in-out infinite;
}

.status-dot-error {
    background: var(--status-error);
}

.status-dot-aborted {
    background: var(--status-aborted);
}

@keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.2); }
}

/* --------------------------------------------------------------------------
   Footer (dashboard, status)
   -------------------------------------------------------------------------- */
.dashboard-footer {
    text-align: center;
    padding: 1.5rem;
    font-size: 0.8125rem;
    color: var(--text-tertiary);
    border-top: 1px solid var(--border-secondary);
}

.dashboard-footer a {
    color: var(--text-link);
    text-decoration: none;
}

.dashboard-footer a:hover {
    text-decoration: underline;
}

/* --------------------------------------------------------------------------
   Extended CSS Variables (shared by dashboard, status, admin)
   -------------------------------------------------------------------------- */
:root {
    /* Backgrounds */
    --bg-sidebar: #f9fafb;
    --bg-code: #f5f5f5;
    --bg-code-block: #1e1e2e;
    --bg-hero: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --bg-search-result: #ffffff;

    /* Text */
    --text-link: #4f46e5;
    --text-link-hover: #4338ca;
    --text-code: #e11d48;
    --text-code-block: #d4d4d8;

    /* Borders */
    --border-secondary: #f3f4f6;

    /* Shadows */
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);

    /* Transitions */
    --transition-normal: 250ms ease;
}

[data-theme="dark"] {
    --bg-sidebar: #161822;
    --bg-code: #1e2030;
    --bg-code-block: #1e2030;
    --bg-hero: linear-gradient(135deg, #3730a3 0%, #6d28d9 100%);
    --bg-search-result: #1e2030;

    --text-link: #818cf8;
    --text-link-hover: #a5b4fc;
    --text-code: #fb7185;
    --text-code-block: #d4d4d8;

    --border-secondary: #252838;

    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
}

html {
    -webkit-text-size-adjust: 100%;
}

/* --------------------------------------------------------------------------
   Shared App Body Layout (dashboard, status, admin)
   -------------------------------------------------------------------------- */
body.app-body {
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* --------------------------------------------------------------------------
   Shared Header Layout (dashboard, status, admin)
   -------------------------------------------------------------------------- */
.header-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

/* --------------------------------------------------------------------------
   Shared Form Row
   -------------------------------------------------------------------------- */
.form-row {
    display: flex;
    gap: 0.75rem;
    align-items: flex-end;
    flex-wrap: wrap;
}

/* --------------------------------------------------------------------------
   Shared Empty State
   -------------------------------------------------------------------------- */
.empty-state {
    text-align: center;
    padding: 2rem;
    color: var(--text-tertiary);
    font-size: 0.875rem;
}

/* --------------------------------------------------------------------------
   Shared Regenerate Inline Controls (dashboard, status)
   -------------------------------------------------------------------------- */
.regenerate-inline {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    padding-top: 0.625rem;
    margin-top: 0.5rem;
    border-top: 1px dashed var(--border-secondary);
}

.regenerate-inline .form-select,
.regenerate-inline .form-input {
    height: 32px;
    font-size: 0.8125rem;
}

.regenerate-inline .form-select {
    width: 110px;
}

.regenerate-inline .form-input {
    width: 180px;
}

.regenerate-inline .form-checkbox-group {
    height: 32px;
}

.regenerate-inline .form-checkbox-group input[type="checkbox"] {
    width: 14px;
    height: 14px;
}

.regenerate-inline .form-checkbox-group label {
    font-size: 0.8125rem;
}

/* --------------------------------------------------------------------------
   Shared Progress Bar (dashboard, status)
   -------------------------------------------------------------------------- */
.progress-bar-wrapper {
    width: 100%;
    height: 6px;
    background: var(--bg-tertiary);
    border-radius: 3px;
    overflow: hidden;
}

.progress-bar-fill {
    height: 100%;
    background: var(--status-generating);
    border-radius: 3px;
    transition: width 0.5s ease;
    position: relative;
}

.progress-bar-fill::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
    animation: shimmer 1.5s infinite;
}

.progress-bar-fill-ready {
    background: var(--status-ready);
}

.progress-bar-fill-ready::after {
    animation: none;
}

/* --------------------------------------------------------------------------
   Shared Spinner (dashboard, status)
   -------------------------------------------------------------------------- */
.spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border-primary);
    border-top-color: var(--status-generating);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

.spinner-large {
    width: 20px;
    height: 20px;
    border: 2.5px solid var(--border-primary);
    border-top-color: var(--status-generating);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
    display: inline-block;
}

/* --------------------------------------------------------------------------
   Shared Keyframe Animations
   -------------------------------------------------------------------------- */
@media (prefers-reduced-motion: reduce) {
    .status-dot-generating { animation: none; }
    .spinner, .spinner-large { animation: none; }
    .progress-bar-fill::after { animation: none; }
}

@keyframes shimmer {
    from { transform: translateX(-100%); }
    to { transform: translateX(100%); }
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
