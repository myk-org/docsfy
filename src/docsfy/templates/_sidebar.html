<script>
(function() {
    var toggle = document.getElementById('sidebar-toggle');
    var sidebar = document.getElementById('sidebar');
    var overlay = document.getElementById('sidebar-overlay');
    if (toggle && sidebar) {
        toggle.addEventListener('click', function() {
            sidebar.classList.toggle('open');
            if (overlay) overlay.classList.toggle('open');
            var expanded = sidebar.classList.contains('open');
            toggle.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        });
    }
    if (overlay) {
        overlay.addEventListener('click', function() {
            sidebar.classList.remove('open');
            overlay.classList.remove('open');
            if (toggle) toggle.setAttribute('aria-expanded', 'false');
        });
    }
})();
</script>
<script>
(function() {
    var sidebar = document.querySelector('.sidebar-nav') || document.querySelector('.sidebar');
    if (!sidebar) return;

    // Restore scroll position
    var saved = sessionStorage.getItem('sidebar-scroll');
    if (saved) sidebar.scrollTop = parseInt(saved, 10);

    // Save scroll position before navigating
    sidebar.addEventListener('scroll', function() {
        sessionStorage.setItem('sidebar-scroll', sidebar.scrollTop.toString());
    });

    // Also scroll active link into view if no saved position
    if (!saved) {
        var active = sidebar.querySelector('.nav-link.active');
        if (active) {
            active.scrollIntoView({ block: 'center', behavior: 'instant' });
        }
    }
})();
</script>
