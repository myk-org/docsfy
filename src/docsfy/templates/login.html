<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>docsfy - Login</title>
    <style>
    :root {
        --bg-primary: #ffffff;
        --bg-secondary: #f9fafb;
        --text-primary: #111827;
        --text-secondary: #4b5563;
        --border-primary: #e5e7eb;
        --border-focus: #4f46e5;
        --accent: #4f46e5;
        --accent-light: #eef2ff;
        --accent-hover: #4338ca;
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        --transition-fast: 150ms ease;
    }

    [data-theme="dark"] {
        --bg-primary: #0f1117;
        --bg-secondary: #161822;
        --text-primary: #e5e7eb;
        --text-secondary: #9ca3af;
        --border-primary: #2e3248;
        --border-focus: #818cf8;
        --accent: #818cf8;
        --accent-light: #1e1b4b;
        --accent-hover: #a5b4fc;
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -2px rgba(0, 0, 0, 0.3);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: var(--font-sans);
        background: var(--bg-secondary);
        color: var(--text-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
    }
    .login-card {
        background: var(--bg-primary);
        border: 1px solid var(--border-primary);
        border-radius: 12px;
        box-shadow: var(--shadow-md);
        padding: 2.5rem;
        width: 100%;
        max-width: 400px;
    }
    .login-card h1 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
        text-align: center;
    }
    .login-card p {
        color: var(--text-secondary);
        text-align: center;
        margin-bottom: 1.5rem;
        font-size: 0.875rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 0.375rem;
    }
    .form-group input {
        width: 100%;
        padding: 0.625rem 0.75rem;
        border: 1px solid var(--border-primary);
        border-radius: 6px;
        font-size: 0.875rem;
        background: var(--bg-primary);
        color: var(--text-primary);
        transition: border-color 0.15s;
    }
    .form-group input:focus {
        outline: none;
        border-color: var(--border-focus);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    .btn-login {
        width: 100%;
        padding: 0.625rem;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
    }
    .btn-login:hover { background: var(--accent-hover); }
    .error-msg {
        background: #fef2f2;
        color: #dc2626;
        border: 1px solid #fecaca;
        border-radius: 6px;
        padding: 0.625rem;
        margin-bottom: 1rem;
        font-size: 0.8125rem;
        text-align: center;
    }
    [data-theme="dark"] .error-msg {
        background: #450a0a;
        color: #fca5a5;
        border-color: #7f1d1d;
    }
    .brand-accent {
        color: var(--accent);
    }
    .theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: 1px solid var(--border-primary);
        border-radius: 8px;
        background: var(--bg-primary);
        color: var(--text-secondary);
        cursor: pointer;
        transition: color var(--transition-fast), border-color var(--transition-fast);
    }
    .theme-toggle:hover {
        color: var(--text-primary);
        border-color: var(--border-focus);
    }
    [data-theme="dark"] .icon-sun { display: none; }
    [data-theme="light"] .icon-moon { display: none; }
    </style>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
    </button>
    <div class="login-card">
        <h1><span class="brand">docs<span class="brand-accent">fy</span></span></h1>
        <p style="margin-bottom: 1.5rem;">Enter your credentials to continue</p>
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username" autofocus>
            </div>
            <div class="form-group">
                <!-- Field name="api_key" matches the POST handler in main.py (form.get("api_key")).
                     Label says "Password" for UX, but the backend field name is api_key. -->
                <label for="api_key">Password</label>
                <input type="password" id="api_key" name="api_key" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>
        <!-- Intentional: This hint is safe for self-hosted setups where the admin
             password is set via environment variable (ADMIN_KEY). It does not reveal
             the actual password, only the username convention. -->
        <p style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 1rem;">
            Admin login: username <strong>admin</strong> with the admin password.
        </p>
    </div>
    {% include '_theme.html' %}
</body>
</html>
